exclude_tags: firebase-emulator || prod || wif

presets:
  ci:
    exclude_tags: prod || wif
  firebase-emulator:
    include_tags: firebase-emulator
  prod:
    include_tags: prod
  wif:
    include_tags: wif

tags:
  firebase-emulator:
    description: >
      Tests that require Firebase emulators (Auth, Firestore, Storage, Functions).
      Run with: firebase emulators:exec "dart test -P firebase-emulator"
  prod:
    description: >
      Tests that hit real Firebase production APIs.
      Requires GOOGLE_APPLICATION_CREDENTIALS pointing to a service account
      with access to the dart-firebase-admin project.
  wif:
    description: >
      Tests that verify the Workload Identity Federation credential flow.
      Requires GOOGLE_APPLICATION_CREDENTIALS pointing to an external_account
      JSON (set up via google-github-actions/auth in CI, or gcloud locally).
